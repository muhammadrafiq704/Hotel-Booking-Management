pre-commit:
  parallel: true
  commands:
    client-biome:
      run: npm run biome:fix --prefix client
      glob: "client/src/**/*.{js,jsx,ts,tsx}"

    server-biome:
      run: npm run biome:fix --prefix server
      glob: "server/src/**/*.{js,ts}"

commit-msg:
  parallel: true
  commands:
    commitlint:
      run: npx commitlint --edit {1}