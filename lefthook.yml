pre-commit:
  parallel: true
  commands:
    biome:
      run: npx biome check --write {staged_files}
      glob: "{client,server}/**/*.{js,jsx,ts,tsx,json}"

pre-push:
  commands:
    biome-check:
      run: npx biome check .

commit-msg:
  parallel: true
  commands:
    commitlint:
      run: npx commitlint --edit {1}