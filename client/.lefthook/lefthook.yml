pre-commit:
  parallel: true
  commands:
    biome-check:
      run: npm run biome:check
      include: "./src/**/*.{js,jsx,ts,tsx}"
      exclude: "node_modules"
    biome-fix:
      run: npm run biome:fix
      include: "./src/**/*.{js,jsx,ts,tsx}"
      exclude: "node_modules"

pre-push:
  parallel: true
  commands:
    biome-check:
      run: npm run biome:check
    biome-fix:
      run: npm run biome:fix

commit-msg:
  parallel: true
  commands:
    commitlint:
      run: npx commitlint --edit {1}